{% extends "base.html" %} {% import "materiaPrima/_macros_mate.html" as mm %} {%
block content %}
<div class="max-w-[1800px] mx-auto p-8">
  <div class="mb-8">
    <h1 class="text-4xl font-bold text-wonka-purple">
      Modificar Materia Prima
    </h1>
  </div>

  <form
    action="{{ url_for('materiaPrima.modificar_materia', id=materia_id) }}"
    method="POST"
    enctype="multipart/form-data"
  >
    {{ form.csrf_token }}
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

    {{ mm.formulario_edicion_materia(form, materia_id, materia) }}
  </form>
</div>
{% endblock %}
