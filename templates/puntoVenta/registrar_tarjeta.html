{% extends "base.html" %} {% block content %}
<div
  class="flex flex-col items-center justify-center min-h-[85vh] p-6 bg-[#fdfaf3]"
>
  <div class="mb-8 w-full max-w-md">
    <a
      href="{{ url_for('puntoVenta.index') }}"
      class="group text-gray-400 hover:text-[#3d1c02] transition-all flex items-center gap-3 font-black text-[10px] uppercase tracking-[0.2em]"
    >
      <div class="bg-white p-2 rounded-full shadow-sm group-hover:shadow-md">
        <i data-lucide="chevron-left" class="w-4 h-4"></i>
      </div>
      Cancelar y volver al carrito
    </a>
  </div>

  <div
    class="bg-white w-full max-w-lg rounded-[4rem] p-12 shadow-2xl border border-[#D4AF37]/10 relative overflow-hidden"
  >
    <div
      class="absolute top-0 right-0 w-48 h-48 bg-[#D4AF37]/5 rounded-full -mr-24 -mt-24"
    ></div>
    <div
      class="absolute bottom-0 left-0 w-32 h-32 bg-[#3d1c02]/5 rounded-full -ml-16 -mb-16 rotate-45"
    ></div>

    <div class="text-center mb-10 relative">
      <div
        class="bg-gradient-to-br from-[#3d1c02] to-[#5d2e06] w-20 h-20 rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-2xl transform -rotate-6 border-4 border-white"
      >
        <i data-lucide="shield-check" class="text-[#D4AF37] w-10 h-10"></i>
      </div>
      <h2
        class="text-4xl font-wonka-title font-bold text-[#3d1c02] italic tracking-tight leading-none"
      >
        Pago Seguro
      </h2>
      <p
        class="text-[9px] text-gray-400 uppercase tracking-[0.4em] font-black mt-4"
      >
        Encriptación Nivel Wonka
      </p>
    </div>

    <form
      action="{{ url_for('puntoVenta.registrar_tarjeta_view') }}"
      method="POST"
      class="space-y-8 relative"
    >
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

      <div class="space-y-3">
        <label
          class="text-[10px] font-black text-[#3d1c02] uppercase tracking-widest ml-4"
          >Número de Plástico Real</label
        >
        <div class="relative">
          <input
            type="text"
            name="numero_tarjeta"
            placeholder="0000 0000 0000 0000"
            maxlength="16"
            required
            class="w-full bg-[#fdfaf3] border-2 border-transparent focus:border-[#D4AF37] focus:bg-white rounded-[1.8rem] p-6 text-base font-mono outline-none transition-all shadow-inner tracking-[0.2em]"
          />
          <i
            data-lucide="credit-card"
            class="absolute right-6 top-6 text-gray-300 w-5 h-5"
          ></i>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-6">
        <div class="space-y-3">
          <label
            class="text-[10px] font-black text-[#3d1c02] uppercase tracking-widest ml-4"
            >Vencimiento</label
          >
          <input
            type="text"
            id="vencimiento"
            name="vencimiento"
            placeholder="MM/AA"
            maxlength="5"
            required
            class="w-full bg-[#fdfaf3] border-2 border-transparent focus:border-[#D4AF37] focus:bg-white rounded-[1.8rem] p-6 text-sm font-mono outline-none transition-all text-center shadow-inner uppercase"
          />
        </div>

        <div class="space-y-3">
          <label
            class="text-[10px] font-black text-[#3d1c02] uppercase tracking-widest ml-4"
            >Clave CVV</label
          >
          <input
            type="password"
            placeholder="***"
            maxlength="3"
            required
            class="w-full bg-[#fdfaf3] border-2 border-transparent focus:border-[#D4AF37] focus:bg-white rounded-[1.8rem] p-6 text-sm font-mono outline-none transition-all text-center shadow-inner"
          />
        </div>
      </div>

      <div class="pt-6">
        <button
          type="submit"
          class="w-full bg-gradient-to-r from-[#3d1c02] to-[#5d2e06] text-white py-7 rounded-[2rem] font-black text-[11px] uppercase tracking-[0.3em] hover:brightness-125 hover:scale-[1.02] transition-all shadow-2xl active:scale-95 flex items-center justify-center gap-4"
        >
          <i data-lucide="lock" class="w-4 h-4 text-[#D4AF37]"></i> Confirmar mi
          Pago
        </button>
      </div>
    </form>

    <div class="flex items-center justify-center gap-6 mt-12 opacity-30">
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg"
        class="h-4 grayscale"
      />
      <img
        src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg"
        class="h-6 grayscale"
      />
    </div>
  </div>
</div>

<script>
  document
    .getElementById("vencimiento")
    .addEventListener("input", function (e) {
      let value = e.target.value.replace(/\D/g, "");

      if (value.length > 2) {
        e.target.value = value.slice(0, 2) + "/" + value.slice(2, 4);
      } else {
        e.target.value = value;
      }
    });

  document.getElementById("vencimiento").addEventListener("blur", function (e) {
    let parts = e.target.value.split("/");
    if (parts[0] && (parseInt(parts[0]) > 12 || parseInt(parts[0]) === 0)) {
      alert("¡Mes inválido! Por favor usa un mes del 01 al 12.");
      e.target.value = "";
    }
  });
</script>
{% endblock %}
