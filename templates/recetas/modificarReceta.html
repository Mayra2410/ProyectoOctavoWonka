{% extends "base.html" %}
{% import "recetas/_macros_recetas.html" as mr %}
{% block content %}
<div class="max-w-[1800px] mx-auto p-8">
  <div class="mb-8">
    <h1 class="text-4xl font-bold text-wonka-purple">Modificar Receta</h1>
  </div>

  <form
    action="{{ url_for('recetas.modificar_receta', id_receta=receta.id_receta) }}"
    method="POST"
    novalidate
  >
    {{ form.csrf_token }}
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

    {{ mr.formulario_edicion_receta(form, receta.id_receta) }}
  </form>
</div>
{% endblock %}
