<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Wonka</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fdfaf3; }
        .bg-wonka-chocolate { background-color: #3d1c02; }
        .text-wonka-chocolate { color: #3d1c02; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl p-8 border border-[#d4af37]/20 text-center">
        <h1 class="text-2xl font-black text-wonka-chocolate uppercase italic mb-4">Verifica tu Codigo</h1>
        
        <p class="text-xs mb-6">Ingresa el codigo dorado enviado a: <br><strong>{{ email }}</strong></p>

        <form action="{{ url_for('registro.verificar_codigo', email=email) }}" method="POST" class="space-y-6">
            
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <input type="text" name="codigo" maxlength="6" placeholder="000000" required
                class="w-full bg-[#fdfaf3] border border-gray-100 rounded-xl p-4 text-center text-3xl font-black tracking-[0.5em] text-wonka-chocolate outline-none focus:border-[#d4af37]">

            <button type="submit" class="w-full py-4 bg-wonka-chocolate text-white font-bold rounded-xl shadow-lg hover:brightness-125 transition-all uppercase tracking-widest text-xs">
                Activar Cuenta
            </button>
        </form>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
