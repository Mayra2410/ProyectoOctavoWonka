<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo | Wonka Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #fdfaf8; color: #6F4E37; }
        .font-wonka { font-family: 'Playfair Display', serif; }

        .product-card {
            background: white;
            border: 1px solid #D4AF3760;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(111, 78, 55, 0.08);
            border-color: #7B2CBF;
        }

        .category-tag {
            font-size: 9px;
            letter-spacing: 0.1em;
            color: #7B2CBF;
            background: rgba(123, 44, 191, 0.05);
            border: 1px solid rgba(123, 44, 191, 0.1);
        }
    </style>
</head>
<body class="p-8 md:p-16">

    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-20">
        <div class="flex items-center gap-2">
            <i data-lucide="chef-hat" class="w-6 h-6 text-[#7B2CBF]"></i>
            <h2 class="font-wonka text-2xl tracking-tight text-[#6F4E37]">Wonka</h2>
        </div>
        <a href="/" class="text-[10px] uppercase tracking-[0.2em] font-bold text-[#D4AF37] hover:text-[#7B2CBF] transition-colors flex items-center gap-2">
            <i data-lucide="arrow-left" class="w-3 h-3"></i> Volver al Inicio
        </a>
    </nav>

    <main class="max-w-7xl mx-auto">
        <header class="mb-16 border-l-4 border-[#D4AF37] pl-8">
            <p class="text-[11px] uppercase tracking-[0.5em] text-[#D4AF37] font-black mb-2">Exhibición</p>
            <h1 class="font-wonka text-5xl md:text-6xl text-[#6F4E37]">Colección Mágica</h1>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            {% for p in productos %}
            <div class="product-card rounded-[2rem] p-8 flex flex-col">
                <div class="flex justify-between items-start mb-6">
                    <span class="category-tag px-4 py-1.5 rounded-full font-bold uppercase">
                        {{ p.categoria }}
                    </span>
                    <i data-lucide="sparkles" class="w-4 h-4 text-[#D4AF37] opacity-40"></i>
                </div>

                <div class="h-48 bg-[#f9f7f5] rounded-2xl border border-dashed border-gray-200 flex items-center justify-center mb-8">
                    <i data-lucide="image" class="w-8 h-8 text-gray-300"></i>
                </div>

                <div class="mb-8">
                    <h3 class="font-wonka text-2xl text-[#6F4E37] mb-3 leading-tight">{{ p.nombre }}</h3>
                    <p class="text-[13px] text-gray-400 font-light leading-relaxed line-clamp-3">
                        {{ p.descripcion }}
                    </p>
                </div>

                <div class="mt-auto pt-8 border-t border-gray-50 flex justify-between items-end">
                    <div>
                        <span class="text-[9px] uppercase tracking-widest text-[#D4AF37] font-bold block mb-1">Precio</span>
                        <span class="text-2xl font-bold text-[#6F4E37]">${{ "%.2f"|format(p.precio_venta) }}</span>
                    </div>
                    <div class="flex items-center gap-1.5 px-3 py-1 bg-[#fcfaf8] rounded-full text-[10px] text-gray-400 font-medium">
                        <i data-lucide="clock" class="w-3 h-3 text-[#7B2CBF]"></i>
                        {{ p.tiempo_produccion_minutos }}'
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </main>

    <footer class="max-w-7xl mx-auto mt-32 py-12 border-t border-gray-100 text-center">
        <p class="text-[10px] uppercase tracking-[0.4em] text-gray-300 font-medium">Propiedad de la Fábrica Wonka &copy; 2026</p>
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
